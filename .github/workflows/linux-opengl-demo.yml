name: Linux OpenGL Demo

on:
  push:
  pull_request:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libglfw3-dev libglew-dev libgl1-mesa-dev xvfb

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Run OpenGL demo (xvfb)
        run: xvfb-run -s "-screen 0 1280x720x24" ./build/demos/opengl/basic_triangle/opengl_basic_triangle --max-frames 120
